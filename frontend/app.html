<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QoS 编排工作台</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="workspace-shell">
      <header class="workspace-header card">
        <div>
          <h1>QoS 编排工作台</h1>
          <p>完成两次输入后触发后端编排计算</p>
        </div>
        <button id="logout-btn" class="ghost-btn">退出登录</button>
      </header>

      <section class="card">
        <h2>上传业务感知模块图片</h2>
        <form id="step1-form" novalidate>
          <label class="field">
            <span>业务图片</span>
            <input id="business-image" type="file" accept="image/*" required />
          </label>
          <button type="submit" class="secondary-btn">保存步骤 1</button>
        </form>
      </section>

      <section class="card">
        <h2>填写虚拟计算资源需求</h2>
        <form id="step2-form" novalidate>
          <div class="grid-two">
            <label class="field">
              <span>vCPU（核）</span>
              <input id="vcpu" type="number" min="1" step="1" required />
            </label>
            <label class="field">
              <span>内存（GB）</span>
              <input id="memory" type="number" min="1" step="1" required />
            </label>
            <label class="field">
              <span>存储（GB）</span>
              <input id="storage" type="number" min="1" step="1" required />
            </label>
            <label class="field">
              <span>带宽（Mbps）</span>
              <input id="bandwidth" type="number" min="1" step="1" required />
            </label>
          </div>

          <label class="field">
            <span>资源补充说明（可选）</span>
            <textarea id="resource-note" rows="4" placeholder="可填写业务峰值、地域偏好、时延目标等"></textarea>
          </label>

          <button id="run-orchestration-btn" type="submit" class="primary-btn">提交并开始编排</button>
        </form>
      </section>

      <section class="card">
        <h2>编排结果</h2>
        <div id="orchestration-message" class="message" aria-live="polite"></div>
        <pre id="orchestration-result" class="result-box">暂无结果</pre>
        <button id="download-btn" class="secondary-btn" disabled>下载编排结果</button>
      </section>
    </main>

    <script type="module" src="./js/workflow.js"></script>
  </body>
</html>
