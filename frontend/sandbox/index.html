<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QoS 路径编排工作台</title>
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <main class="workspace-shell">
      <header class="workspace-header workspace-banner">
        <div>
          <h1>QoS 编排工作台</h1>
        </div>
        <button id="logout-btn" class="ghost-btn">退出登录</button>
      </header>

      <div class="workspace-main-grid">
        <div class="workspace-left">
          <section class="card">
            <h2>多模态输入路径</h2>
            <form id="path-form" novalidate>
              <label class="field">
                <span>RGB 图像路径</span>
                <input id="business-image-path" type="text" placeholder="例如: /root/data-driven_2/data/sample/001.png" required />
              </label>

              <label class="field">
                <span>点云文件路径（.tif/.tiff）</span>
                <input id="point-cloud-path" type="text" placeholder="例如: /root/data-driven_2/data/sample/001.tiff" required />
              </label>

              <button type="submit" class="secondary-btn">保存路径</button>
            </form>
          </section>

          <section class="card">
            <h2>填写虚拟计算资源需求</h2>
            <form id="resource-form" novalidate>
              <label class="field">
                <span>数据库资源模板</span>
                <div class="grid-two">
                  <select id="resource-profile" required>
                    <option value="">请选择数据库中的可用资源</option>
                  </select>
                  <button id="refresh-resource-btn" type="button" class="ghost-btn">刷新资源</button>
                </div>
              </label>
              <div id="resource-load-message" class="message" aria-live="polite"></div>

              <button id="run-orchestration-btn" type="submit" class="primary-btn">提交并开始编排</button>
            </form>
          </section>

          <section class="card">
            <h2>物理资源可视化</h2>
            <div id="visualization-container">
              <canvas id="resource-canvas"></canvas>
            </div>
            <div id="visualization-message" class="message" aria-live="polite"></div>
          </section>

          <section class="card">
            <h2>添加物理节点资源</h2>
            <form id="add-node-form" novalidate>
              <div class="grid-two">
                <label class="field">
                  <span>CPU负载率(0-1)</span>
                  <input id="node-cpu" type="number" min="0" max="1" step="0.01" value="0.5" required />
                </label>
                <label class="field">
                  <span>内存负载率(0-1)</span>
                  <input id="node-memory" type="number" min="0" max="1" step="0.01" value="0.5" required />
                </label>
                <label class="field">
                  <span>能耗系数(0-1)</span>
                  <input id="node-energy" type="number" min="0" max="1" step="0.01" value="0.5" required />
                </label>
                <label class="field">
                  <span>vCPU（核）</span>
                  <input id="node-vcpu" type="number" min="1" step="1" value="16" required />
                </label>
                <label class="field">
                  <span>内存（GB）</span>
                  <input id="node-memory-gb" type="number" min="1" step="1" value="32" required />
                </label>
                <label class="field">
                  <span>存储（GB）</span>
                  <input id="node-storage" type="number" min="1" step="1" value="500" required />
                </label>
                <label class="field">
                  <span>带宽（Mbps）</span>
                  <input id="node-bandwidth" type="number" min="1" step="1" value="10000" required />
                </label>
              </div>
              <button id="add-node-btn" type="submit" class="secondary-btn">保存节点</button>
              <div id="add-node-message" class="message" aria-live="polite"></div>
            </form>
          </section>

          <section class="card">
            <h2>添加物理链路资源</h2>
            <form id="add-link-form" novalidate>
              <div class="grid-two">
                <label class="field">
                  <span>源节点ID</span>
                  <input id="link-src-node" type="number" min="0" step="1" placeholder="例如: 0" required />
                </label>
                <label class="field">
                  <span>目标节点ID</span>
                  <input id="link-dst-node" type="number" min="0" step="1" placeholder="例如: 1" required />
                </label>
                <label class="field">
                  <span>带宽(归一化0-2)</span>
                  <input id="link-bandwidth" type="number" min="0" max="2" step="0.1" value="1.0" required />
                </label>
                <label class="field">
                  <span>时延(ms)</span>
                  <input id="link-latency" type="number" min="0" step="1" value="10" required />
                </label>
                <label class="field">
                  <span>路径ID</span>
                  <input id="link-path-id" type="number" min="0" step="1" value="0" required />
                </label>
              </div>
              <button id="add-link-btn" type="submit" class="secondary-btn">保存链路</button>
              <div id="add-link-message" class="message" aria-live="polite"></div>
            </form>
          </section>

          <section class="card">
            <h2>删除物理资源</h2>
            <form id="delete-resource-form" novalidate>
              <label class="field">
                <span>选择要删除的资源</span>
                <select id="delete-resource-select" required>
                  <option value="">请选择要删除的资源</option>
                </select>
              </label>
              <div id="delete-resource-message" class="message" aria-live="polite"></div>
              <button id="delete-resource-btn" type="submit" class="danger-btn">删除资源</button>
            </form>
          </section>
        </div>

        <div class="workspace-right">
          <section class="card result-panel">
            <h2>编排结果</h2>
            <div id="orchestration-message" class="message" aria-live="polite"></div>
            <pre id="orchestration-result" class="result-box">暂无结果</pre>
            <button id="download-btn" class="secondary-btn" disabled>下载编排结果</button>
          </section>

          <section class="card result-panel">
            <h2>编排结果可视化</h2>
            <div id="result-visualization-status" class="message" aria-live="polite"></div>
            <div id="result-visualization-container">
              <canvas id="result-canvas"></canvas>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script type="module" src="./path-workflow.js"></script>
  </body>
</html>
