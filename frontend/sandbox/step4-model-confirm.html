<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QoS 编排 - 步骤4：确认检测</title>
    <link rel="stylesheet" href="../assets/styles.css" />
    <style>
      .step-container { max-width: 800px; margin: 40px auto; padding: 20px; }
      .step-header { text-align: center; margin-bottom: 40px; }
      .step-header h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 8px; }
      .step-header .step-indicator { color: #666; font-size: 14px; }
      .confirm-panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 32px; }
      .model-icon { font-size: 64px; text-align: center; margin-bottom: 16px; }
      .model-name { font-size: 24px; font-weight: 600; text-align: center; color: #1a1a2e; }
      .model-desc { font-size: 14px; color: #666; text-align: center; margin: 8px 0 24px; }
      .file-summary { background: #f9fafb; border-radius: 8px; padding: 16px; margin: 24px 0; }
      .file-summary h4 { margin: 0 0 12px; font-size: 14px; color: #374151; }
      .file-summary-item { display: flex; padding: 8px 0; border-bottom: 1px solid #e5e7eb; font-size: 13px; }
      .file-summary-item:last-child { border-bottom: none; }
      .file-summary-item .label { width: 80px; color: #6b7280; flex-shrink: 0; }
      .file-summary-item .value { color: #374151; word-break: break-all; }
      .loading-panel { display: none; text-align: center; padding: 48px; }
      .loading-panel.active { display: block; }
      .spinner { width: 48px; height: 48px; border: 4px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
      @keyframes spin { to { transform: rotate(360deg); } }.loading-text { color: #374151; font-size: 16px; }
      .actions { display: flex; justify-content: center; gap: 16px; margin-top: 32px; }
      .primary-btn { background: #3b82f6; color: #fff; border: none; padding: 12px 32px; border-radius: 8px; font-size: 16px; cursor: pointer; }
      .primary-btn:hover { background: #2563eb; }
      .primary-btn:disabled { background: #94a3b8; cursor: not-allowed; }
      .secondary-btn { background: #fff; color: #6b7280; border: 2px solid #d1d5db; padding: 12px 32px; border-radius: 8px; font-size: 16px; cursor: pointer; }
      .secondary-btn:hover { border-color: #9ca3af; }
      .message { text-align: center; padding: 12px; border-radius: 8px; margin-top: 16px; }
      .message.error { background: #fee2e2; color: #dc2626; }
      .message.success { background: #dcfce7; color: #166534; }
      .message.warning { background: #fef3c7; color: #92400e; }
      .dialog-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
      .dialog-content { background: #fff; padding: 24px; border-radius: 12px; max-width: 420px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
      .dialog-content h3 { margin: 0 0 12px; color: #92400e; }
      .dialog-content pre { background: #f3f4f6; padding: 8px; border-radius: 4px; font-size: 12px; overflow-x: auto; }
      .dialog-buttons { display: flex; gap: 8px; margin-top: 16px; justify-content: center; }
      .dialog-buttons .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
      .btn-primary { background: #3b82f6; color: #fff; }
      .btn-warning { background: #f59e0b; color: #fff; }
      .btn-secondary { background: #e5e7eb; color: #374151; }
    </style>
  </head>
  <body>
    <div class="step-container">
      <div class="step-header">
        <h1>QoS 智能编排系统</h1>
        <p class="step-indicator">步骤 4 / 5 - 确认并运行检测</p>
        <button class="ghost-btn" onclick="logout()" style="position:absolute;top:20px;right:20px;">退出登录</button>
      </div>
      <div class="confirm-panel" id="confirm-panel">
        <div class="model-icon" id="model-icon"></div>
        <div class="model-name" id="model-name"></div>
        <div class="model-desc" id="model-desc"></div>
        <div class="file-summary"><h4>待检测文件</h4><div id="file-list"></div></div>
        <div class="message" id="message"></div>
        <div class="actions">
          <button class="secondary-btn" onclick="goPrev()">返回修改</button>
          <button id="run-btn" class="primary-btn" onclick="runDetection()">开始检测</button>
        </div>
      </div>
      <div class="loading-panel" id="loading-panel">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">正在��用模型进行异常检测...</div>
        <div class="message" id="loading-message"></div>
      </div>
    </div>
    <script src="js/step-workflow.js"></script>
    <script>
      if (!requireAuth()) { throw new Error("Not logged in"); }
      const state = StepState.load();
      const modelType = state.model_type;
      const filePaths = state.file_paths || {};
      const modelInfo = {
        CFM: { icon: "CFM", name: "CrossModal Feature Mapping", desc: "Image-PointCloud cross-modal anomaly detection" },
        Jigsaw: { icon: "Jigsaw", name: "Video Anomaly Detection", desc: "Spatiotemporal graph convolutional network" }
      };
      document.getElementById("model-icon").textContent = modelInfo[modelType].icon;
      document.getElementById("model-name").textContent = modelInfo[modelType].name;
      document.getElementById("model-desc").textContent = modelInfo[modelType].desc;
      let fileListHtml = "";
      if (filePaths.rgb_path) fileListHtml += '<div class="file-summary-item"><span class="label">RGB Image:</span><span class="value">' + filePaths.rgb_path + '</span></div>';
      if (filePaths.pcd_path) fileListHtml += '<div class="file-summary-item"><span class="label">PointCloud:</span><span class="value">' + filePaths.pcd_path + '</span></div>';
      if (filePaths.video_path) fileListHtml += '<div class="file-summary-item"><span class="label">Video:</span><span class="value">' + filePaths.video_path + '</span></div>';
      if (filePaths.aux_image_path) fileListHtml += '<div class="file-summary-item"><span class="label">Aux Image:</span><span class="value">' + filePaths.aux_image_path + '</span></div>';
      document.getElementById("file-list").innerHTML = fileListHtml;
      StepState.setStep(4);
      async function runDetection() {
        const confirmPanel = document.getElementById("confirm-panel");
        const loadingPanel = document.getElementById("loading-panel");
        const loadingMessage = document.getElementById("loading-message");
        const runBtn = document.getElementById("run-btn");
        confirmPanel.style.display = "none";
        loadingPanel.classList.add("active");
        runBtn.disabled = true;
        try {
          const requestData = { model_type: modelType };
          if (modelType === "CFM") { requestData.businessImagePath = filePaths.rgb_path; requestData.pointCloudPath = filePaths.pcd_path; }
          else { requestData.videoPath = filePaths.video_path; requestData.auxiliaryImagePath = filePaths.aux_image_path; }
          loadingMessage.textContent = "正在处理...";
          loadingMessage.className = "message";

          // 使用 /api/orchestrate 接口调用编排服务
          const taskId = "web-" + Date.now();
          // 使用6维QoS向量 [latency, jitter, loss, throughput, reliability, priority]
          const qosVector = [0.05, 0.025, 0.5, 0.002, 0.6, 0.57];
          const resourceRequest = { vcpu: 2, memory: 2 };

          let apiPath = "http://localhost:8001/api/orchestrate";
          let apiBody = {
            task_id: taskId,
            qos_vector: qosVector,
            resource_request: resourceRequest,
            model_type: modelType
          };

          if (modelType === "CFM") {
            apiBody.rgb_path = filePaths.rgb_path;
            apiBody.pcd_path = filePaths.pcd_path;
          } else if (modelType === "Jigsaw") {
            apiBody.video_path = filePaths.video_path || "";
            apiBody.aux_image_path = filePaths.aux_image_path || "";
          }

          const response = await fetch(apiPath, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(apiBody)
          });
          const result = await response.json();

          if (result.status === "success") {
            StepState.setResult(result.anomaly_score || 0.5, result.risk_level || "NORMAL", result.qos_vector || qosVector);
            setTimeout(() => { window.location.href = "step5-result.html"; }, 500);
          } else if (result.error === "resource_wait_timeout") {
            loadingMessage.textContent = "资源不足，请释放资源或重试";
            loadingMessage.className = "message warning";
            showResourceDialog(result);
            loadingPanel.classList.remove("active"); confirmPanel.style.display = "block"; runBtn.disabled = false;
          } else {
            loadingMessage.textContent = "编排失败: " + (result.error || "未知错误");
            loadingMessage.className = "message error";
            confirmPanel.style.display = "block"; loadingPanel.classList.remove("active"); runBtn.disabled = false;
          }
        } catch (error) {
          loadingMessage.textContent = "请求失败: " + error.message;
          loadingMessage.className = "message error";
          confirmPanel.style.display = "block"; loadingPanel.classList.remove("active"); runBtn.disabled = false;
        }
      }
      function goPrev() { window.location.href = "step3-file-input.html"; }

      // 显示资源不足弹窗
      function showResourceDialog(result) {
        const resourceDetail = result.resource_detail || {};
        const resourceNeed = result.resource_need || {};
        const waitSeconds = result.resource_wait_seconds || 5;

        const dialog = document.createElement('div');
        dialog.id = 'resource-dialog';
        dialog.innerHTML = `
          <div class="dialog-overlay">
            <div class="dialog-content">
              <h3>⚠️ 资源不足</h3>
              <p>等待 <strong>${waitSeconds.toFixed(1)}秒</strong> 后仍无可用资源</p>
              <div class="resource-need">
                <h4>需要资源：</h4>
                <pre>${JSON.stringify(resourceNeed, null, 2)}</pre>
              </div>
              <div class="resource-current">
                <h4>节点 ${resourceDetail.resource_id} 当前状态：</h4>
                <pre>需要: vcpu=${resourceDetail.need?.vcpu}, memory=${resourceDetail.need?.memory_gb}GB
可用: vcpu=${resourceDetail.free?.vcpu}, memory=${resourceDetail.free?.memory_gb}GB</pre>
              </div>
              <div class="dialog-buttons">
                <button id="btn-release" class="btn btn-warning">释放资源</button>
                <button id="btn-retry" class="btn btn-primary">重试编排</button>
                <button id="btn-cancel" class="btn btn-secondary">取消</button>
              </div>
            </div>
          </div>
        `;
        document.body.appendChild(dialog);

        document.getElementById('btn-cancel').onclick = () => dialog.remove();
        document.getElementById('btn-release').onclick = async () => {
          try {
            const resp = await fetch('http://localhost:8001/api/resources');
            const nodes = await resp.json();
            const allocationIds = [];
            const histResp = await fetch('http://localhost:8001/api/history');
            const history = await histResp.json();
            for (const h of (history.history || []).slice(-10)) {
              for (const nodeId of Object.keys(h.node_allocation || {})) {
                allocationIds.push(h.allocation_id);
              }
            }
            const uniq = [...new Set(allocationIds)];
            if (uniq.length > 0) {
              await fetch('http://localhost:8001/api/release', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({allocation_ids: uniq})
              });
            }
            alert('已释放 ' + uniq.length + ' 个资源分配');
            dialog.remove();
          } catch (e) {
            alert('释放失败: ' + e.message);
          }
        };
        document.getElementById('btn-retry').onclick = () => {
          dialog.remove();
          runModel();
        };
      }
      function logout() {
        localStorage.removeItem("qos_token");
        localStorage.removeItem("qos_user");
        window.location.href = "../index.html";
      }
    </script>
  </body>
</html>
